<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=yes">
  <title>联系我们 - 迎鑫童鞋</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="./" class="back-btn">‹ 返回</a>
    联系我们
  </header>

  <!-- 店铺名片 -->
  <div class="contact-card">
    <div class="card-header">
      <div class="shop-name" id="contactShopName"></div>
      <div style="font-size:0.85rem;margin-top:4px;opacity:0.85;" id="contactSlogan"></div>
    </div>
    <div class="card-body">
      <!-- 电话 -->
      <a class="contact-item" id="phoneLink" href="">
        <span class="ci-icon phone">📱</span>
        <span class="ci-text">
          <span class="ci-label">电话咨询</span><br>
          <span class="ci-value" id="phoneText"></span>
        </span>
        <span class="ci-arrow">›</span>
      </a>

      <!-- 微信 -->
      <div class="contact-item" id="wechatItem" onclick="copyWechat()">
        <span class="ci-icon wechat">💬</span>
        <span class="ci-text">
          <span class="ci-label">添加微信（点击复制）</span><br>
          <span class="ci-value" id="wechatText"></span>
        </span>
        <span class="ci-arrow">›</span>
      </div>

      <!-- 地址 -->
      <a class="contact-item" id="addressLink" href="" target="_blank">
        <span class="ci-icon address">📍</span>
        <span class="ci-text">
          <span class="ci-label">店铺地址</span><br>
          <span class="ci-value" id="addressText"></span>
          <br><span style="font-size:0.75rem;color:#999;" id="addressNote"></span>
        </span>
        <span class="ci-arrow">›</span>
      </a>

      <!-- 营业时间 -->
      <div class="contact-item">
        <span class="ci-icon time">🕐</span>
        <span class="ci-text">
          <span class="ci-label">营业时间</span><br>
          <span class="ci-value" id="hoursText"></span><br>
          <span style="font-size:0.75rem;color:#999;" id="daysText"></span>
        </span>
      </div>
    </div>
  </div>

  <!-- 服务说明 -->
  <div class="section-title" style="margin-top:8px;">🛎️ 我们的服务</div>
  <div class="services" id="servicesGrid"></div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="./"><span class="icon">🏠</span> 首页</a>
    <a href="list"><span class="icon">👟</span> 全部商品</a>
    <a href="contact" class="active"><span class="icon">📞</span> 联系我们</a>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast" style="display:none;"></div>

  <script src="data/shop.js"></script>
  <script>
    // 填充店铺联系信息
    document.getElementById('contactShopName').textContent = SHOP.name;
    document.getElementById('contactSlogan').textContent = SHOP.slogan;
    document.getElementById('phoneText').textContent = SHOP.phone;
    document.getElementById('wechatText').textContent = '微信号：' + SHOP.wechat;
    document.getElementById('addressText').textContent = SHOP.address;
    document.getElementById('addressNote').textContent = SHOP.addressNote || '';
    document.getElementById('hoursText').textContent = SHOP.businessHours;
    document.getElementById('daysText').textContent = SHOP.businessDays || '';

    // 设置可点击链接
    document.getElementById('phoneLink').href = 'tel:' + SHOP.phone;
    document.getElementById('addressLink').href =
      'https://uri.amap.com/search?keyword=' + encodeURIComponent(SHOP.address);

    // 服务说明
    const svcGrid = document.getElementById('servicesGrid');
    svcGrid.innerHTML = (SHOP.services || []).map(s => `
      <div class="service-item">
        <span class="si-icon">${s.icon}</span>
        <span class="si-text">${s.text}</span>
      </div>
    `).join('');

    // 复制微信号
    function copyWechat() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(SHOP.wechat).then(() => showToast('微信号已复制，去微信添加好友吧~'));
      } else {
        // 微信内置浏览器不支持 clipboard API，用传统方法
        const ta = document.createElement('textarea');
        ta.value = SHOP.wechat;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('微信号已复制，去微信添加好友吧~');
      }
    }
    // 暴露到全局
    window.copyWechat = copyWechat;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      t.style.animation = 'none';
      t.offsetHeight; // 触发回流
      t.style.animation = 'toastIn 0.3s ease';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
  </script>

</body>
</html>
